server:
  port: 8080

spring:
  application:
    name: yi-design-backend
  
  datasource:
    url: jdbc:mysql://localhost:3306/yi_design?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8
    username: root
    password: your_password  # 请修改为你的MySQL密码
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.yidesign.model.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: yi-design-jwt-secret-key-2024-please-change-this-in-production
  expiration: 86400000  # 24小时

# 文件存储配置
file:
  upload-path: /uploads/  # 文件上传路径
  max-size: 52428800  # 50MB

# Playwright 配置
playwright:
  headless: true
  timeout: 30000  # 30秒超时