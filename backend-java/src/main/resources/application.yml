server:
  port: 8080

spring:
  application:
    name: yi-design-backend
  
  datasource:
    url: jdbc:mysql://localhost:3306/yi_design?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8
    username: root
    password: your_password  # 请修改为你的MySQL密码
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.yidesign.model.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: yi-design-jwt-secret-key-2024-please-change-this-in-production
  expiration: 86400000  # 24小时

# 文件存储配置
file:
  upload-path: /uploads/  # 文件上传路径
  max-size: 52428800  # 50MB

# Playwright 配置
playwright:
  headless: true
  timeout: 30000  # 30秒超时

# 支付配置
payment:
  alipay:
    app-id: ${ALIPAY_APP_ID:your_alipay_app_id}
    private-key: ${ALIPAY_PRIVATE_KEY:your_private_key}
    public-key: ${ALIPAY_PUBLIC_KEY:alipay_public_key}
    gateway-url: https://openapi.alipay.com/gateway.do
    notify-url: ${ALIPAY_NOTIFY_URL:http://your-domain/api/vip/notify/alipay}
    return-url: ${ALIPAY_RETURN_URL:http://your-domain/vip/success}
  
  wechat:
    app-id: ${WECHAT_APP_ID:your_wechat_app_id}
    mch-id: ${WECHAT_MCH_ID:your_mch_id}
    api-key: ${WECHAT_API_KEY:your_api_key}
    notify-url: ${WECHAT_NOTIFY_URL:http://your-domain/api/vip/notify/wechat}