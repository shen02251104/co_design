server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: yidesign-backend
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yidesign?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: your_password_here
    
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/**/*.xml

# JWT 配置
jwt:
  secret: your_jwt_secret_key_here_minimum_256_bits_required
  expiration: 86400000  # 24小时

# Knife4j API文档配置
knife4j:
  enable: true
  openapi:
    title: 易设计API文档
    description: 易设计电商设计平台后端API接口文档
    version: 1.0.0
    contact:
      name: 易设计团队
      email: support@yidesign.com
    group:
      default:
        group-name: 默认分组
        api-rule: package
        api-rule-resources:
          - com.yidesign.controller

# 日志配置
logging:
  level:
    com.yidesign: debug
    org.springframework: info
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'